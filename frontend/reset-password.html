<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NoteApp - Đặt lại mật khẩu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-box">
      <h1>📝 NoteApp</h1>
      <h3 style="text-align:center; margin-bottom:20px; color:var(--text)">🔑 Đặt lại mật khẩu</h3>
      <input type="password" id="new-password" placeholder="Mật khẩu mới (ít nhất 6 ký tự)">
      <input type="password" id="confirm-password" placeholder="Xác nhận mật khẩu mới">
      <button class="btn-primary" onclick="resetPassword()">Đặt lại mật khẩu</button>
      <p style="text-align:center; margin-top:12px;">
        <a href="index.html" style="color:var(--primary)">← Quay lại đăng nhập</a>
      </p>
    </div>
  </div>
  <div class="toast-container" id="toast-container"></div>
  <script>
    const API = 'https://noteapp-backend-goqh.onrender.com/api';

    function showToast(message, type = 'info', duration = 3000) {
      const container = document.getElementById('toast-container');
      const icons = { success: '✅', error: '❌', info: 'ℹ️', warning: '⚠️' };
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `<span>${icons[type]}</span><span>${message}</span>`;
      container.appendChild(toast);
      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, duration);
    }

    async function resetPassword() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (!newPassword || !confirmPassword) {
        showToast('Vui lòng điền đầy đủ!', 'warning');
        return;
      }
      if (newPassword.length < 6) {
        showToast('Mật khẩu phải có ít nhất 6 ký tự!', 'warning');
        return;
      }
      if (newPassword !== confirmPassword) {
        showToast('Mật khẩu xác nhận không khớp!', 'error');
        return;
      }

      try {
        const res = await fetch(`${API}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const data = await res.json();
        if (res.ok) {
          showToast('Đặt lại mật khẩu thành công!', 'success');
          setTimeout(() => window.location.href = 'index.html', 2000);
        } else {
          showToast(data.message, 'error');
        }
      } catch (err) {
        showToast('Lỗi kết nối server!', 'error');
      }
    }
  </script>
</body>
</html>
